<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Sheabok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: #FAF9F6;
  color: #1A1A1A;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  -webkit-font-smoothing: antialiased;
}
.wrapper { max-width: 480px; }
.code {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(5rem, 15vw, 9rem);
  font-weight: 300;
  line-height: 1;
  background: linear-gradient(135deg, #D4B96A, #C6A75E, #A8893E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1rem;
}
.divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #C6A75E, transparent);
  margin: 1.5rem auto;
}
h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.6rem;
  font-weight: 300;
  margin-bottom: 0.75rem;
}
p {
  font-size: 0.92rem;
  font-weight: 300;
  color: #5C5850;
  line-height: 1.7;
  margin-bottom: 2rem;
}
.btn {
  display: inline-flex;
  align-items: center;
  font-family: 'Outfit', system-ui, sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  background: linear-gradient(135deg, #D4B96A, #C6A75E, #A8893E, #C6A75E);
  background-size: 300% 300%;
  animation: btnShimmer 5s ease-in-out infinite;
  color: #FFFFFF;
  padding: 1rem 2.5rem;
  border-radius: 6px;
  box-shadow: 0 4px 20px rgba(198, 167, 94, 0.2);
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.btn:hover {
  box-shadow: 0 8px 30px rgba(198, 167, 94, 0.35);
  transform: translateY(-2px);
}
@keyframes btnShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.logo {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1rem;
  color: #C6A75E;
  letter-spacing: 0.1em;
  margin-top: 3rem;
  opacity: 0.6;
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="code">404</div>
  <div class="divider"></div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for has wandered off. Let's get you back to smooth, radiant territory.</p>
  <a href="/" class="btn">Return Home</a>
  <div class="logo">Sheabok</div>
</div>
</body>
</html>
